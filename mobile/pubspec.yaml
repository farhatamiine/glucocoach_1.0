name: glucocoach
description: "Personal diabetes management app - GlucoCoach Mobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.0
  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.8.0
  retrofit: ^4.1.0
  connectivity_plus: ^6.1.3

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0

  # Security
  flutter_secure_storage: ^9.2.4
  envied: ^1.1.1

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Notifications
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.3
  flutter_local_notifications: ^19.0.0

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  collection: ^1.19.1

  # Navigation
  go_router: ^14.8.1

  # Logging
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  retrofit_generator: ^9.1.9
  riverpod_generator: ^2.6.3
  hive_ce_generator: ^1.1.1
  envied_generator: ^1.1.1

flutter:
  uses-material-design: true

