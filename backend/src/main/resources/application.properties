spring.application.name=server

spring.datasource.url=jdbc:postgresql://localhost:5432/glucocoach
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver


# Options: none, validate, update, create, create-drop
# For development, 'update' is convenient but consider 'validate' or 'none' for production
spring.jpa.hibernate.ddl-auto=update
# Enable SQL logging for debugging (disable in production)       
spring.jpa.show-sql=true
# Format SQL output for better readability (optional)
spring.jpa.properties.hibernate.format_sql=true


# Property names MUST match exactly what JwtService reads with @Value
# JwtService uses: ${jwt.secret}, ${jwt.expiration}, ${jwt.refresh-expiration}
jwt.secret=glucocoach-super-secret-key-must-be-at-least-32-characters-long!
jwt.expiration=86400000
jwt.refresh-expiration=604800000

server.port=8080
nightscout-api-secret=48f875fa-0e03-416f-b9d6-19c9afc4e197
nightscout-url=http://141.94.121.93:1337

logging.level.com.glucocoach=DEBUG
logging.level.org.springframework.web.client=DEBUG

# Firebase Cloud Messaging — leave blank to disable FCM in dev/CI
# Set FIREBASE_CREDENTIALS_PATH env var in prod pointing to service-account JSON
app.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}

# Glucose alert scheduler — runs every 60 seconds
app.alert.check-interval-ms=60000

# LLM meal analysis — set LLM_API_KEY env var in prod
app.llm.api-key=${LLM_API_KEY:}
app.llm.model=claude-opus-4-5

# Multipart file upload limit for meal image uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Application-level max size enforced before reading bytes (10 MB default)
app.upload.max-size-bytes=10485760